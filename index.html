<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push Me</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111; /* Darkened the background to make the lights pop */
      overflow: hidden;
    }

    .arrow-container {
      margin-bottom: 30px;
      animation: bounce 2s infinite ease-in-out;
    }

    /* Increased the size of the arrow */
    .arrow {
      width: 200px;
      height: 290px;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5)); /* Universal glow for all colors */
    }

    .arrow-bg {
      fill: #222;
      stroke: #444;
      stroke-width: 2;
    }

    /* Round, moving, multi-colored lights */
    .arrow-lights {
      fill: none;
      stroke: url(#rainbowGradient); /* Uses the SVG gradient for different colors */
      stroke-width: 14; /* Size of the light bulbs */
      stroke-linecap: round; /* Makes the dashes perfectly round */
      stroke-dasharray: 0 35; /* 0 length dash, 35px gap = evenly spaced dots */
      animation: moveRoundLights 1s linear infinite;
    }

    @keyframes moveRoundLights {
      /* Offset needs to be a multiple of the dash gap (35) to loop smoothly */
      from { stroke-dashoffset: 70; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    button {
      background-color: #ff003c;
      color: white;
      font-size: 2.5rem;
      font-weight: bold;
      padding: 30px 80px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      position: relative;
      z-index: 10;
      box-shadow: 0 8px 25px rgba(255, 0, 60, 0.4);
      transition: background-color 0.3s, transform 0.1s, box-shadow 0.3s;
    }

    button:hover {
      background-color: #d90033;
      box-shadow: 0 12px 35px rgba(255, 0, 60, 0.6);
    }

    button:active {
      transform: scale(0.92);
      box-shadow: 0 4px 15px rgba(255, 0, 60, 0.4);
    }
  </style>
</head>
<body>
  
  <div class="arrow-container">
    <svg class="arrow" viewBox="0 0 200 290">
      <defs>
        <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff0000" />
          <stop offset="20%" stop-color="#ffff00" />
          <stop offset="40%" stop-color="#00ff00" />
          <stop offset="60%" stop-color="#00ffff" />
          <stop offset="80%" stop-color="#0000ff" />
          <stop offset="100%" stop-color="#ff00ff" />
        </linearGradient>
      </defs>
      
      <polygon class="arrow-bg" points="70,10 130,10 130,160 190,160 100,270 10,160 70,160" />
      <polygon class="arrow-lights" points="70,10 130,10 130,160 190,160 100,270 10,160 70,160" />
    </svg>
  </div>

  <button id="push-btn">Graphnet Go Live! Push me</button>

  <script>
    const button = document.getElementById('push-btn');

    button.addEventListener('click', () => {
      confetti({
        particleCount: 300,      
        spread: 140,             
        origin: { y: 0.6 },      
        colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff']
      });
    });
  </script>
</body>
</html>
